name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crew_mgmt_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret' }}
      NEXTAUTH_URL: 'http://localhost:3000'
      DATABASE_URL: 'postgresql://postgres:***@localhost:5432/crew_mgmt_test'
      GITHUB_ID: 'dummy'
      GITHUB_SECRET: 'dummy'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests (including Axe accessibility)
        run: npx playwright test

      - name: Run Lighthouse CI
        run: npx lhci collect && npx lhci assert

      - name: Stop server
        if: always()
        run: pkill -f "next start" || true

      - name: Run unit tests
        run: npm run test -- --detectOpenHandles --forceExit