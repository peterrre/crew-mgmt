name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: 'http://localhost:3000'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run test -- --detectOpenHandles --forceExit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Playwright Dependencies (if needed)
        run: |
          # Fallback: install common dependencies if playwright install-deps fails
          sudo apt-get update || true
          sudo apt-get install -y libgtk-3-0 libgbm-dev libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libnspr4 libpango-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes1 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 || echo "Some dependencies already installed or failed to install"

      - run: npm run test:e2e